server:
  name: deer-flow-go
  host: 0.0.0.0
  port: 8001

models:
  - name: gpt-4o
    display_name: GPT-4o
    use: openai
    api_key: $OPENAI_API_KEY
    supports_thinking: false
    supports_vision: true

memory:
  enabled: true
  storage_path: .deer-flow/memory.json
  injection_enabled: true
  max_injection_tokens: 2000

storage:
  data_dir: .deer-flow